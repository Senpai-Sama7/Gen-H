name: Gen-H Premium Site CI

on:
  push:
    paths:
      - 'genh-premium-site/**'
      - '.github/workflows/genh-premium-site.yml'
  pull_request:
    paths:
      - 'genh-premium-site/**'
      - '.github/workflows/genh-premium-site.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: genh-premium-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: genh-premium-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
